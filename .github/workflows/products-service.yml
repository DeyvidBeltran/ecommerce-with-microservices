name: Products Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'products-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'products-service/**'

jobs:
  # ─── Job 1: Build y validación ────────────────────────────
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: products-service/package-lock.json

      - name: Install dependencies
        working-directory: products-service
        run: npm install

      - name: Build service
        working-directory: products-service
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: products-service-dist
          path: products-service/dist/

  # ─── Job 2: Versionado automático ─────────────────────────
  version:
    name: Auto Version & Changelog
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        working-directory: products-service
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Determine version bump
        id: version_bump
        run: |
          COMMITS=$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s" -10)
          echo "Recent commits:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qiE "^feat(\(.+\))?!:|^fix(\(.+\))?!:|BREAKING CHANGE"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: new_version
        working-directory: products-service
        run: |
          BUMP=${{ steps.version_bump.outputs.bump }}
          npm version $BUMP --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Generate changelog
        run: |
          NEW_VERSION=${{ steps.new_version.outputs.version }}
          DATE=$(date +%Y-%m-%d)

          COMMITS=$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s (%h)" 2>/dev/null || git log --pretty=format:"- %s (%h)" -10)

          CHANGELOG_ENTRY="## [$NEW_VERSION] - $DATE\n\n### Changes\n$COMMITS\n"

          if [ -f CHANGELOG.md ]; then
            echo -e "$CHANGELOG_ENTRY\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n$CHANGELOG_ENTRY" > CHANGELOG.md
          fi

          echo "Changelog updated"
          cat CHANGELOG.md

      - name: Commit version bump and changelog
        run: |
          git add products-service/package.json CHANGELOG.md
          git commit -m "chore: bump products-service version to ${{ steps.new_version.outputs.version }} [skip ci]"
          git tag "products-service-v${{ steps.new_version.outputs.version }}"
          git push origin main --tags

  # ─── Job 3: Simulación de despliegue ──────────────────────
  deploy-simulation:
    name: Deploy Simulation
    runs-on: ubuntu-latest
    needs: version
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: products-service-dist
          path: products-service/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: products-service
        run: |
          docker build -t products-service:latest .
          echo "Docker image built successfully"

      - name: Simulate deployment
        run: |
          echo "========================================="
          echo "  DEPLOYMENT SIMULATION"
          echo "========================================="
          echo "Service:     products-service"
          echo "Version:     ${{ needs.version.outputs.new_version || 'latest' }}"
          echo "Environment: production"
          echo "Image:       products-service:latest"
          echo "Port:        3001"
          echo "-----------------------------------------"
          echo "Steps:"
          echo "  [1/4] Pulling image...       DONE"
          echo "  [2/4] Stopping old container DONE"
          echo "  [3/4] Starting new container DONE"
          echo "  [4/4] Health check...        DONE"
          echo "-----------------------------------------"
          echo "Deployment completed successfully"
          echo "========================================="